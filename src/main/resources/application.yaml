spring:
  application:
    name: jpa-exmp
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update # для dev; для prod лучше validate + миграции
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never # можно always, если хочешь schema.sql/data.sql

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace